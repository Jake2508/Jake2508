name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight
  workflow_dispatch:       # Allows manual trigger

permissions:
  contents: write
  
jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Stats SVGs
        run: |
          curl -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=Jake2508&hide=stars&count_private=true&show_icons=true&theme=algolia&border_radius=20"
          curl -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=Jake2508&layout=compact&show_icons=true&theme=algolia&border_radius=20"

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats.svg top-langs.svg
          git diff --cached --quiet || git commit -m "Update stats"
          git push
